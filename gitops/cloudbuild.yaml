steps:
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "europe-west3-docker.pkg.dev/$PROJECT_ID/app/app:latest", "."]

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "europe-west3-docker.pkg.dev/$PROJECT_ID/app/app:latest"]

  - name: "gcr.io/cloud-builders/kubectl"
    args:
      - "apply"
      - "-f"
      - "kustomize/overlays/prod"
    env:
      - "CLOUDSDK_COMPUTE_REGION=europe-west3"
      - "CLOUDSDK_CONTAINER_CLUSTER=gke-prod"
