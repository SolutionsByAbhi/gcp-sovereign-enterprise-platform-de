apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sovereign-app
  namespace: argocd
spec:
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  source:
    repoURL: https://github.com/your-org/gcp-sovereign-enterprise-platform-de
    path: gitops/kustomize/overlays/prod
    targetRevision: HEAD
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
